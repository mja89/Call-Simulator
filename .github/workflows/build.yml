name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CallSimulator-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Rename APK with run number
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/CallSimulator-v${{ github.run_number }}.apk

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: نسخه ${{ github.run_number }}
          files: app/build/outputs/apk/debug/CallSimulator-v${{ github.run_number }}.apk
